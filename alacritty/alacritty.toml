yellow = "0xd79921"

[colors.primary]
background = "0x282828"
foreground = "0xebdbb2"

[env]
TERM = "alacritty"

[font]
size = 18

[font.bold]
family = "DankMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "DankMono Nerd Font Mono"
style = "Italic"

[font.normal]
family = "DankMono Nerd Font Mono"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "Paste"

[[keyboard.bindings]]
action = "Copy"
key = "Copy"

[[keyboard.bindings]]
chars = "\f"
key = "K"
mode = "~Vi|~Search"
mods = "Command"

[general]
live_config_reload = true

[selection]
save_to_clipboard = true

[window]
decorations = "none"
opacity = 0.95
startup_mode = "Maximized"

[keyboard]
